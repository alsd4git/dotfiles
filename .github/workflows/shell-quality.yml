name: Shell Quality

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      full_install:
        description: Run the full Linux installer, including optional tool bootstrap
        required: false
        default: false
        type: boolean

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: ShellCheck
        run: |
          shellcheck -x \
            install.sh \
            macos/defaults.sh \
            macos/dock.sh \
            old_setup.sh \
            general/.aliases \
            general/.functions \
            general/.history_settings \
            general/.omp_init \
            git/.git_aliases \
            git/.git_functions

      - name: shfmt (check only)
        run: |
          shfmt -d -i 4 -ci -bn \
            install.sh \
            macos/defaults.sh \
            macos/dock.sh \
            old_setup.sh \
            general/.aliases \
            general/.functions \
            general/.history_settings \
            general/.omp_init \
            git/.git_aliases \
            git/.git_functions

  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer dry-run
        env:
          HOME: ${{ runner.temp }}/dotfiles-dry-run-home
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          ./install.sh --dry-run --minimal

  smoke-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, zsh]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zsh
        if: matrix.shell == 'zsh'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Run minimal install
        env:
          HOME: ${{ runner.temp }}/dotfiles-smoke-${{ matrix.shell }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME"

          if [ "${{ matrix.shell }}" = "zsh" ]; then
            shell_bin="$(command -v zsh)"
          else
            shell_bin="/bin/bash"
          fi

          export SHELL="$shell_bin"
          ./install.sh --minimal

          mkdir -p "$HOME/.local/bin"
          cat >"$HOME/.local/bin/codex-smoke" <<'EOF'
          #!/usr/bin/env bash
          echo smoke
          EOF
          chmod +x "$HOME/.local/bin/codex-smoke"

          env -i HOME="$HOME" SHELL="$shell_bin" PATH="/usr/bin:/bin" "$shell_bin" -ic '
            type aa >/dev/null
            type l >/dev/null
            type gl >/dev/null
            command -v codex-smoke >/dev/null
          '

  installer-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and uninstall without changing pre-existing Git settings
        env:
          HOME: ${{ runner.temp }}/dotfiles-lifecycle-home
          SHELL: /bin/bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          git config --global pull.rebase false
          git config --global core.editor vim

          ./install.sh --skip-tools --force
          test "$(git config --global --get pull.rebase)" = true
          test "$(git config --global --get core.editor)" = nano
          test -L "$HOME/.shell_aliases"

          ./install.sh --uninstall
          test "$(git config --global --get pull.rebase)" = false
          test "$(git config --global --get core.editor)" = vim
          ! git config --global --get core.excludesfile >/dev/null 2>&1
          test ! -e "$HOME/.shell_aliases"

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell sources and run the minimal dry-run
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sources = @('install.ps1', 'windows/profile.ps1')
          foreach ($source in $sources) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $source),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

          Import-PowerShellDataFile -Path windows/packages.psd1 | Out-Null
          ./install.ps1 -DryRun -Minimal

  full-install:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_install == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run the full Linux installer
        env:
          HOME: ${{ runner.temp }}/dotfiles-full-install-home
          SHELL: /bin/bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          ./install.sh --all --force
