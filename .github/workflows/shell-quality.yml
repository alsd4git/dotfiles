name: Shell Quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: ShellCheck
        run: |
          shellcheck -x \
            install.sh \
            old_setup.sh \
            general/.aliases \
            general/.functions \
            general/.history_settings \
            general/.omp_init \
            git/.git_aliases \
            git/.git_functions

      - name: shfmt (check only)
        run: |
          shfmt -d -i 4 -ci -bn \
            install.sh \
            old_setup.sh \
            general/.aliases \
            general/.functions \
            general/.history_settings \
            general/.omp_init \
            git/.git_aliases \
            git/.git_functions
